<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4">Login</h3>

                <form action="/user/loginuser" onsubmit="return validateLogin()" method="post">

                    <div class="mb-3">
                        <input type="email" id="email" name="email" class="form-control" placeholder="Email Id" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Login</button>
                    </div>

                    <div class="text-center mt-3">
                        <a th:href="@{/user/register}">Do not have an account? register</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
