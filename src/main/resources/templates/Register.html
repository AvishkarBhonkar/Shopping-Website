<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4">Register</h3>

                <form action="/user/save" method="post"> 
                    
                    <div class="mb-3">
                        <input type="text" id="name" name="name" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" id="email" name="email" class="form-control" placeholder="Email Id" required>
                    </div>

                    <div class="mb-3">
                        <input type="number" id="phoneno" name="phoneno" class="form-control" placeholder="Phone Number" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    
                    <div class="mb-3">
    					<select name="role" class="form-select" required>
        					<option value="">Select Role</option>
        					<option value="USER">USER</option>
        					<option value="ADMIN">ADMIN</option>
    					</select>
					</div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>

                    <div class="text-center mt-3">
                        <a th:href="@{/user/login}">Already have an account? Login</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
